<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aagam GPT | Jain Stavans & Sutras</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--saffron:#C8560A;--gold:#C8960C;--deep:#8B3A0A;--cream:#FAF6EE;--parchment:#F0E8D5;--ink:#1C1208;--muted:#7A6845;--border:#D9C9A3;--white:#FFFDF8;--accent:#FDF4E3}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Noto Sans',Arial,sans-serif;background:var(--cream);color:var(--ink);display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#1C1208 0%,#2C1A06 100%);color:var(--cream);text-align:center;padding:1rem 1.5rem .8rem;cursor:pointer;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(200,150,12,.04) 30px,rgba(200,150,12,.04) 60px)}
header h1{font-size:clamp(1.2rem,2.5vw,1.7rem);font-weight:700;position:relative}
header h1 span{font-family:'Noto Sans Devanagari','Noto Sans',Arial,sans-serif;font-size:clamp(.8rem,1.5vw,1rem);color:var(--gold);display:block;margin-top:.1rem;font-weight:500}
nav{background:var(--ink);display:flex;justify-content:center;border-bottom:2px solid var(--gold);flex-wrap:wrap}
.nv{color:#C8B898;font-family:'Noto Sans',Arial,sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.1em;padding:.8rem 1.5rem;text-transform:uppercase;text-decoration:none;display:inline-block;transition:color .2s}
.nv:hover{color:var(--gold)}
.nv.on{color:var(--gold);border-bottom:2px solid var(--gold);margin-bottom:-2px}
.frame-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
iframe{flex:1;width:100%;border:none;min-height:0}
.fallback{display:none;flex:1;align-items:center;justify-content:center;text-align:center;padding:3rem 1.5rem}
.fallback.show{display:flex}
.fb-card{max-width:520px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:2.5rem 2rem}
.fb-card .om{font-size:3rem;color:var(--gold);display:block;margin-bottom:1rem}
.fb-card h2{color:var(--deep);font-size:1.4rem;margin-bottom:.75rem}
.fb-card p{color:var(--muted);font-size:.95rem;line-height:1.7;margin-bottom:1.5rem}
.fb-btn{display:inline-block;background:var(--saffron);color:#fff;text-decoration:none;font-weight:700;font-size:1rem;padding:.85rem 2rem;border-radius:4px;transition:background .2s}
.fb-btn:hover{background:var(--deep)}
</style>
</head>
<body>
<header onclick="location.href='index.html'">
  <h1>Aagam GPT <span>आगम ज्ञान — Ask anything about Jain scriptures</span></h1>
</header>
<nav>
  <a class="nv" href="index.html">Home</a>
  <a class="nv" href="index.html#stavans">Stavans</a>
  <a class="nv" href="index.html#sutras">Sutras</a>
  <a class="nv" href="index.html#swadyah">Swadyah</a>
  <a class="nv" href="games.html">Games</a>
  <a class="nv" href="tools.html">Tools</a>
  <a class="nv on" href="aagamgpt.html">Aagam GPT</a>
</nav>

<div class="frame-wrap">
  <iframe id="agFrame" src="https://aagamgpt.com/" title="Aagam GPT"
    allow="clipboard-write" referrerpolicy="no-referrer-when-downgrade"></iframe>
  <div class="fallback" id="fallback">
    <div class="fb-card">
      <span class="om">☸</span>
      <h2>Aagam GPT</h2>
      <p>Aagam GPT is an AI assistant for exploring the Jain Aagams and scriptures.
      It can't be embedded directly in this page, but you can open it in a new tab below.</p>
      <a class="fb-btn" href="https://aagamgpt.com/" target="_blank" rel="noopener">Open Aagam GPT ↗</a>
    </div>
  </div>
</div>

<script>
// If the iframe is blocked (X-Frame-Options / CSP), it stays blank.
// We can't read cross-origin content, so use a heuristic: if after load
// the frame fails to fire 'load' or the user agent refused, show fallback.
const frame = document.getElementById('agFrame');
const fallback = document.getElementById('fallback');
let loaded = false;
frame.addEventListener('load', () => { loaded = true; });
// Most embed-blocked iframes still fire 'load' on the error page, so also
// offer the fallback after a delay if the frame appears empty/blocked.
setTimeout(() => {
  if (!loaded) {
    frame.style.display = 'none';
    fallback.classList.add('show');
  }
}, 5000);
frame.addEventListener('error', () => {
  frame.style.display = 'none';
  fallback.classList.add('show');
});
</script>
</body>
</html>
